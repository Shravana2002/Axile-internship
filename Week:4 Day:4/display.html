<!DOCTYPE html>
<html>
<head>
    <title>Stored Students</title>
</head>
<body>
    <h2>Stored Student Data</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[3] }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/">Add New Student</a>
</body>
</html>
